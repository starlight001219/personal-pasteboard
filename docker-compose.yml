services:
  pasteboard:
    build: .
    container_name: personal-pasteboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3088
      PASTEBOARD_DATA_DIR: /app/data
      PASTEBOARD_SECURE_COOKIES: ${PASTEBOARD_SECURE_COOKIES:-false}
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:3088:3088"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3088/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
