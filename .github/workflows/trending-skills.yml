name: GitHub Trending Skills Scanner

on:
  schedule:
    # 每天 UTC 时间 00:00 运行 (北京时间 08:00)
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      min_stars:
        description: "Minimum stars threshold"
        required: false
        default: "500"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  scan-trending:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Run trending scanner
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd scripts/github-skills
        python search_trending.py
        
    - name: Check for changes
      id: check_changes
      run: |
        git status
        if git diff --quiet; then
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          echo "changes=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Create Pull Request
      if: steps.check_changes.outputs.changes == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "🤖 Update GitHub trending skills"
        committer: "GitHub Trending Bot <noreply@github.com>"
        author: "GitHub Trending Bot <noreply@github.com>"
        branch: "auto-update/trending-skills"
        delete-branch: true
        title: "🤖 Auto-update: GitHub Trending Skills"
        body: |
          ## 📊 GitHub Trending Skills Update
          
          This PR automatically updates the trending GitHub projects for:
          - 💻 软件开发 (Software Development)
          - 🔒 网络安全 (Cybersecurity)
          - ⚙️ DevOps
          
          ### Changes
          - Updated trending projects lists
          - New skill files generated
          
          ---
          
          *This PR was automatically created by GitHub Trending Scanner*
        labels: |
          automated
          skills
          trending
          
    - name: Summary
      if: always()
      run: |
        echo "## 📊 Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "Claude_技能_Skills/github_trending/scan_summary.json" ]; then
          cat "Claude_技能_Skills/github_trending/scan_summary.json" | jq -r '
            "- **Total Projects**: \(.total_projects)",
            "- **Generated At**: \(.generated_at)",
            "- **Files Created**: \(.files_created | length)"
          ' >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ No summary file generated" >> $GITHUB_STEP_SUMMARY
        fi
